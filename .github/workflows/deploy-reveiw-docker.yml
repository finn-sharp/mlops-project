name: Deploy ReivewAnalyzer to EC2 (Docker)

on:
  # 협업 시, pull_request : 이벤트는 PR이 생성되거나 업데이트될 때마다 발생해요
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy ReivewAnalyzer to EC2 via SSH
        # 해당 Ubuntu 환경에서 SSH 액션을 사용해서 EC2에 접속할 거예요
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            if ! command -v docker &> /dev/null; then
              echo "Docker 미설치 - 설치 시작"
              sudo dnf update -y
              sudo dnf install -y docker
              sudo systemctl start docker
              sudo systemctl enable docker
              sudo usermod -aG docker $USER
            fi

            cd ~/mlops-project/Github/review-lecture-solution
            
            git pull origin main
            
            sudo docker build --no-cache -t review-analyzer .

            sudo docker stop review-analyzer || true
            sudo docker rm review-analyzer || true
            
            # 이번에는 8000번 포트 대신 8005번 포트를 사용할 거예요 
            fuser -k 8005/tcp || true
            sleep 2
            
            sudo docker run -d --name review-analyzer -p 8005:8005 -e GEMINI_API=${{ secrets.GEMINI_API }} review-analyzer
